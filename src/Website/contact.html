<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | ZironSec</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family:'Inter', sans-serif; background:#0f172a; color:#fff; padding:2rem; } .card{background:#111827; padding:2rem; border-radius:1rem; max-width:600px; margin:auto;} label, input, textarea { display:block; width:100%; margin-bottom:0.75rem; } input, textarea { background:#1f2937; border:1px solid #334155; color:#e2e8f0; padding:0.75rem; border-radius:0.5rem; }</style>
</head>
<body>
    <div class="card">
        <h1>Contact ZironSec</h1>
        <p>Enter your message and we’ll respond in 1 business day.</p>
        <form id="contactForm">
            <label for="name">Name</label>
            <input id="name" type="text" required>
            <label for="email">Email</label>
            <input id="email" type="email" required>
            <label for="message">Message</label>
            <textarea id="message" required></textarea>
            <button type="submit" style="background:#10b981;color:#fff;border:none;padding:0.75rem 1rem;border-radius:0.5rem;cursor:pointer;">Send</button>
        </form>
        <p id="status"></p>
    </div>

    <script>
    document.getElementById('contactForm').addEventListener('submit', function(e){
        e.preventDefault();
        document.getElementById('status').innerText = 'Thanks! In a real integration, this would POST securely to your backend API (API/Key from env, with CSRF).';
    });
    </script>
</body>
</html>
