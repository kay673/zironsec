<!DOCTYPE html>
<html lang="en" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | ZironSec</title>
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.google.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; frame-src 'self' https://www.google.com https://recaptcha.google.com; img-src 'self' data: https://www.gstatic.com https://www.google.com; connect-src 'self' https://www.google.com /api/contact; form-action 'self'; object-src 'none'; base-uri 'self';">
    <script src="https://www.google.com/recaptcha/api.js" async defer></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>body { font-family:'Inter', sans-serif; background:#0f172a; color:#fff; padding:2rem; } .card{background:#111827; padding:2rem; border-radius:1rem; max-width:600px; margin:auto;} label, input, textarea { display:block; width:100%; margin-bottom:0.75rem; } input, textarea { background:#1f2937; border:1px solid #334155; color:#e2e8f0; padding:0.75rem; border-radius:0.5rem; }</style>
</head>
<body>
    <div class="card">
        <h1>Contact ZironSec</h1>
        <p>Enter your message and we’ll respond in 1 business day.</p>
        <form id="contactForm">
            <label for="name">Name</label>
            <input id="name" type="text" required>
            <label for="email">Email</label>
            <input id="email" type="email" required>
            <label for="message">Message</label>
            <textarea id="message" required></textarea>
            <div class="g-recaptcha" data-sitekey="6Lczj5gsAAAAAPjR7XdA_59aDpaWHEslKrrsycQS"></div>
            <button type="submit" style="background:#10b981;color:#fff;border:none;padding:0.75rem 1rem;border-radius:0.5rem;cursor:pointer;">Send</button>
        </form>
        <p id="status"></p>
    </div>

    <script>
    document.getElementById('contactForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        const status = document.getElementById('status');
        const submitBtn = e.target.querySelector('button[type="submit"]');

        const recaptchaToken = grecaptcha.getResponse();
        if (!recaptchaToken) {
            status.style.color = '#f87171';
            status.innerText = 'Please complete the CAPTCHA verification.';
            return;
        }

        const name    = document.getElementById('name').value.trim();
        const email   = document.getElementById('email').value.trim();
        const message = document.getElementById('message').value.trim();

        submitBtn.disabled = true;
        submitBtn.innerText = 'Sending…';
        status.style.color = '#94a3b8';
        status.innerText = '';

        try {
            const res = await fetch('/api/contact', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, email, message, recaptchaToken }),
            });

            const data = await res.json();

            if (res.ok && data.success) {
                status.style.color = '#34d399';
                status.innerText = 'Thank you! Your message has been received. We will respond within 1 business day.';
                e.target.reset();
                grecaptcha.reset();
            } else {
                throw new Error(data.error || 'Unexpected error');
            }
        } catch (err) {
            status.style.color = '#f87171';
            status.innerText = err.message || 'Something went wrong. Please email support@zironsec.com directly.';
            grecaptcha.reset();
        } finally {
            submitBtn.disabled = false;
            submitBtn.innerText = 'Send';
        }
    });
    </script>
</body>
</html>
